<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClipMaker</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#f2f9ff",
                500: "#3b82f6",
                600: "#2563eb",
              },
            },
            boxShadow: {
              soft: "0 18px 35px rgba(0, 0, 0, 0.18)",
              softHover: "0 24px 60px rgba(0, 0, 0, 0.22)",
            },
          },
        },
      };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
  </head>
  <body
    class="min-h-screen bg-gradient-to-b from-slate-950 via-slate-950 to-slate-900 text-slate-50"
  >
    <main class="flex min-h-screen items-center justify-center px-4 py-24">
      <div class="w-full max-w-xl space-y-10">
        <div class="space-y-3 text-center">
          <div
            class="mx-auto flex h-12 w-12 items-center justify-center rounded-2xl bg-white/10 shadow-soft"
          >
            <i data-lucide="film" class="h-6 w-6 text-brand-500"></i>
          </div>
          <h1 class="text-3xl font-bold tracking-tight text-white sm:text-4xl">
            ClipMaker
          </h1>
          <p class="mx-auto max-w-md text-sm text-slate-300">
            Faça upload, deixe a IA localizar o momento perfeito e gere um clipe
            pronto para viralizar. Sem configurações extras.
          </p>
        </div>

        <div
          class="rounded-3xl border border-white/10 bg-white/5 p-8 shadow-soft backdrop-blur-xl"
        >
          <div class="mb-4 flex items-start justify-between gap-3">
            <div>
              <p class="text-sm font-semibold text-white">Chave Gemini</p>
              <p class="text-xs text-slate-400">
                Sua chave fica segura no browser.
              </p>
            </div>
            <button
              id="toggleKey"
              class="inline-flex items-center gap-2 rounded-full border border-white/15 bg-white/5 px-3 py-2 text-xs font-semibold text-slate-200 transition hover:bg-white/10"
              type="button"
            >
              <i data-lucide="eye" class="h-4 w-4"></i>
              <span>Mostrar</span>
            </button>
          </div>

          <div class="relative">
            <input
              id="apiKey"
              type="password"
              autocomplete="off"
              placeholder="cole sua chave aqui"
              class="w-full rounded-2xl border border-white/15 bg-white/5 px-4 py-3 pr-12 text-sm text-slate-100 shadow-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/30"
            />
            <span
              class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-xs text-slate-400"
              >●●●●●</span
            >
          </div>

          <button
            id="uploadWidget"
            class="flex flex-row justify-center items-center gap-4 mt-6 w-full rounded-2xl bg-brand-500 px-6 py-3 text-sm font-semibold text-white shadow-soft transition transform duration-300 hover:scale-[1.02] hover:bg-brand-400 hover:shadow-softHover focus:outline-none focus:ring-4 focus:ring-brand-500/30"
          >
            <i data-lucide="upload" class="h-4 w-4"></i>
            Começar upload
          </button>

          <p
            id="status"
            class="mt-4 min-h-[1.5rem] text-center text-sm font-medium text-slate-300"
          ></p>
        </div>

        <div
          class="rounded-3xl border border-white/10 bg-white/5 p-6 shadow-soft backdrop-blur-xl"
        >
          <div class="flex items-center justify-between">
            <p class="text-sm font-semibold text-white">Preview</p>
            <span
              class="rounded-full bg-white/10 px-3 py-1 text-xs font-semibold text-slate-300"
            >
              30–60s
            </span>
          </div>

          <div
            class="relative mt-4 overflow-hidden rounded-2xl border border-white/10 bg-black/50"
          >
            <video
              id="video"
              controls
              class="h-72 w-full bg-black/30 object-cover"
              playsinline
              controlsList="nodownload"
            ></video>
            <div
              id="videoOverlay"
              class="pointer-events-none absolute inset-0 flex items-center justify-center bg-black/40 text-sm font-semibold text-white opacity-0 transition-opacity duration-300"
            >
              Processando...
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://upload-widget.cloudinary.com/latest/global/all.js"
      type="text/javascript"
    ></script>
    <script>
      lucide.createIcons();

      const el = {
        status: document.getElementById("status"),
        video: document.getElementById("video"),
        apiKey: document.getElementById("apiKey"),
        button: document.getElementById("uploadWidget"),
        overlay: document.getElementById("videoOverlay"),
        toggleKey: document.getElementById("toggleKey"),
      };

      const app = {
        transcriptionURL: "",
        public_id: "",

        setStatus(message, tone = "neutral") {
          el.status.textContent = message;
          el.status.className = `mt-4 min-h-[1.5rem] text-center text-sm font-medium ${
            tone === "error"
              ? "text-rose-400"
              : tone === "success"
                ? "text-emerald-400"
                : "text-slate-300"
          }`;
        },

        waitForTranscription: async () => {
          const maxAttempts = 30;
          const delay = 2000;

          for (let attempt = 1; attempt <= maxAttempts; attempt++) {
            const url = `https://res.cloudinary.com/${config.cloudName}/raw/upload/v${Date.now()}/${app.public_id}.transcript`;

            try {
              app.setStatus(
                `Verificando transcrição (${attempt}/${maxAttempts})...`,
              );
              const response = await fetch(url);

              if (response.ok) {
                app.transcriptionURL = url;
                app.setStatus("Transcrição encontrada! Gerando vídeo...");
                return true;
              }
            } catch (error) {
              console.warn(`Tentativa ${attempt} falhou:`, error.message);
            }

            if (attempt < maxAttempts) {
              await new Promise((resolve) => setTimeout(resolve, delay));
            }
          }

          app.setStatus(
            "Não conseguimos localizar a transcrição. Tente novamente mais tarde.",
            "error",
          );
          return false;
        },

        getTranscription: async () => {
          const response = await fetch(app.transcriptionURL);
          return response.text();
        },

        sanitizeMoment: (raw) => {
          const cleaned = raw.replace(/\s/g, "");
          const match = cleaned.match(
            /so_[0-9]+(?:\.[0-9]+)?,eo_[0-9]+(?:\.[0-9]+)?/i,
          );
          if (!match) return null;

          const [start, end] = match[0].split(",eo_");
          const startNum = Number(start.replace("so_", ""));
          const endNum = Number(end);
          const duration = endNum - startNum;

          if (
            !Number.isFinite(startNum) ||
            !Number.isFinite(endNum) ||
            duration < 10
          )
            return null;
          return `so_${startNum},eo_${endNum}`;
        },

        getViralMoment: async () => {
          const transcription = await app.getTranscription();
          const model = "gemini-2.5-flash";
          const endpointGemini = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`;

          const prompt = `
Role: You are a professional video editor specializing in viral content.
Task: Analyze the transcription below and identify the most engaging, funny, or surprising segment.
Constraints:
1. Duration: Minimum 30 seconds, Maximum 60 seconds.
2. Format: Return ONLY the start and end string for Cloudinary. Format: so_<start_seconds>,eo_<end_seconds>
3. Examples: "so_10,eo_20" or "so_12.5,eo_45.2"
4. CRITICAL: Do not use markdown, do not use quotes, do not explain. Return ONLY the raw string.
Transcription:
${transcription}`;

          const headers = {
            "x-goog-api-key": el.apiKey.value,
            "Content-Type": "application/json",
          };

          const contents = [
            {
              parts: [
                {
                  text: prompt,
                },
              ],
            },
          ];

          const maxAttempts = 3;
          const delay = 1500;

          for (let attempt = 1; attempt <= maxAttempts; attempt++) {
            try {
              app.setStatus(
                `Gerando momento viral (${attempt}/${maxAttempts})...`,
              );
              const response = await fetch(endpointGemini, {
                method: "POST",
                headers,
                body: JSON.stringify({ contents }),
              });

              if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
              }

              const data = await response.json();
              const rawText = data.candidates[0].content.parts[0].text.trim();
              const sanitized = app.sanitizeMoment(rawText);
              return sanitized ?? "so_0,eo_60";
            } catch (error) {
              const isLastAttempt = attempt === maxAttempts;
              console.warn(
                `Gemini falhou (tentativa ${attempt}/${maxAttempts}):`,
                error.message,
              );
              if (isLastAttempt) {
                app.setStatus(
                  "Não foi possível gerar o momento viral. Tente novamente.",
                  "error",
                );
                throw error;
              }
              await new Promise((resolve) => setTimeout(resolve, delay));
            }
          }
        },
      };

      const config = {
        cloudName: "dhtyvjqoi",
        uploadPreset: "upload_nlw",
      };

      const buildVideoUrl = (moment) => {
        const base = `https://res.cloudinary.com/${config.cloudName}/video/upload`;
        return moment
          ? `${base}/${moment}/${app.public_id}.mp4`
          : `${base}/${app.public_id}.mp4`;
      };

      const myWidget = cloudinary.createUploadWidget(
        config,
        async (error, result) => {
          if (error) {
            console.error(error);
            app.setStatus("Erro no upload. Tente novamente.", "error");
            return;
          }

          if (result && result.event === "success") {
            app.public_id = result.info.public_id;
            el.overlay.style.opacity = "1";

            try {
              const isReady = await app.waitForTranscription();
              if (!isReady) {
                throw new Error("Erro ao buscar transcrição");
              }

              const viralMoment = await app.getViralMoment();
              const viralMomentURL = buildVideoUrl(viralMoment);
              el.video.setAttribute("src", viralMomentURL);
              el.video.load();
              el.overlay.style.opacity = "0";
              app.setStatus("Pronto! Veja o clipe abaixo.", "success");
            } catch (error) {
              console.error(error);
              el.overlay.style.opacity = "0";
            }
          }
        },
      );

      el.button.addEventListener(
        "click",
        () => {
          if (!el.apiKey.value) {
            app.setStatus(
              "Insira sua API do Gemini antes de continuar.",
              "error",
            );
            el.apiKey.focus();
            return;
          }
          myWidget.open();
        },
        false,
      );

      el.toggleKey.addEventListener("click", () => {
        const isPassword = el.apiKey.type === "password";
        el.apiKey.type = isPassword ? "text" : "password";
        el.toggleKey
          .querySelector("i")
          .setAttribute("data-lucide", isPassword ? "eye-off" : "eye");
        el.toggleKey.querySelector("span").textContent = isPassword
          ? "Ocultar"
          : "Mostrar";
        lucide.createIcons();
      });

      gsap.from("#uploadWidget", {
        y: 24,
        opacity: 0,
        duration: 0.7,
        ease: "power3.out",
      });
    </script>
  </body>
</html>
